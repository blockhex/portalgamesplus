<!DOCTYPE html>
<html>
<head>
<title>Portal Games Plus</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

.header {
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    padding: 30px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    font-weight: bold;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="header">Portal Games Plus</div>

<div class="container">

    <div class="card">
        <h3>Slither.io</h3>
        <button onclick="location.href='play/slither.html'">Play</button>
    </div>

    <div class="card">
        <h3>Run 3</h3>
        <button onclick="location.href='play/run3.html'">Play</button>
    </div>

    <div class="card">
        <h3>Happy Wheels</h3>
        <button onclick="location.href='play/happywheels.html'">Play</button>
    </div>

</div>

</body>
</html>
