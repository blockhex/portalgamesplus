<!DOCTYPE html>
<html>
<head>
<title>Portal Games Plus</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.header {
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    padding: 25px;
    font-size: 28px;
    font-weight: bold;
}

.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #38bdf8;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="header">Portal Games Plus</div>

<div class="container">

    <div class="card">
        <h3>DigDig.io</h3>
        <button onclick="window.open('https://digdig.io','_blank')">
            Play
        </button>
    </div>

    <div class="card">
        <h3>Cookie Clicker</h3>
        <button onclick="window.open('https://orteil.dashnet.org/cookieclicker/','_blank')">
            Play
        </button>
    </div>

</div>

</body>
</html>
